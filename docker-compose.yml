name: dependency-track

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dtrack
      POSTGRES_USER: ${SERVICE_USER_POSTGRES:-dtrack}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES:-dtrack}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  apiserver:
    image: dependencytrack/apiserver:5.0.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DT_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dtrack
      DT_DATASOURCE_USERNAME: ${SERVICE_USER_POSTGRES:-dtrack}
      DT_DATASOURCE_PASSWORD: ${SERVICE_PASSWORD_POSTGRES:-dtrack}
    expose:
      - "8080"
    volumes:
      - apiserver-data:/data

  frontend:
    image: dependencytrack/frontend:5.0.2
    restart: unless-stopped
    depends_on:
      - apiserver
    environment:
      # Must be reachable by users' browsers (Coolify sets SERVICE_URL_APISERVER from the apiserver domain).
      API_BASE_URL: ${SERVICE_URL_APISERVER:-http://localhost:8080}
    expose:
      - "8080"

volumes:
  postgres-data:
  apiserver-data:
