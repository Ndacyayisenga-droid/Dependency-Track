name: Dependency-Track

services:
  apiserver:
    image: ghcr.io/dependencytrack/apiserver:5.0.1

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DT_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/dtrack"
      DT_DATASOURCE_USERNAME: "dtrack"
      DT_DATASOURCE_PASSWORD: "dtrack"

      # Important for Coolify deployments (session/login stability)
      DT_BASE_URL: "https://mydyklf409lxn7itpnfs6wre.playground.open-elements.cloud"

      # Fixes common login/CORS issues
      DT_CORS_ALLOWED_ORIGINS: "https://testdt.playground.open-elements.cloud"

    volumes:
      - apiserver-data:/data

    restart: unless-stopped

  frontend:
    image: ghcr.io/dependencytrack/frontend:5.0.1

    environment:
      # MUST be public API URL (NOT localhost)
      API_BASE_URL: "https://mydyklf409lxn7itpnfs6wre.playground.open-elements.cloud"

    restart: unless-stopped

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_DB: "dtrack"
      POSTGRES_USER: "dtrack"
      POSTGRES_PASSWORD: "dtrack"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtrack -d dtrack"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

    restart: unless-stopped

volumes:
  apiserver-data: {}
  postgres-data: {}
