version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dtrack-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: dtrack
      POSTGRES_USER: dtrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtrack -d dtrack"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  apiserver:
    image: dependencytrack/apiserver:5.0.1
    container_name: dtrack-apiserver
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DT_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dtrack
      DT_DATASOURCE_USERNAME: dtrack
      DT_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "8080:8080"

    volumes:
      - dtrack_data:/data

  frontend:
    image: dependencytrack/frontend:5.0.1
    container_name: dtrack-frontend
    restart: unless-stopped

    depends_on:
      - apiserver

    ports:
      - "8081:8080"

volumes:
  postgres_data:
  dtrack_data:
