name: Dependency-Track

services:
  apiserver:
    image: ghcr.io/dependencytrack/apiserver:5.0.1
    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DT_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/dtrack"
      DT_DATASOURCE_USERNAME: "dtrack"
      DT_DATASOURCE_PASSWORD: "dtrack"

      # OPTIONAL but recommended for Coolify deployments
      # Helps avoid login/session redirect issues
      DT_BASE_URL: "https://mydyklf409lxn7itpnfs6wre.playground.open-elements.cloud"

      # OPTIONAL: fix CORS if login fails
      DT_CORS_ALLOWED_ORIGINS: "https://testdt.playground.open-elements.cloud"

    ports:
      - "8085:8080"

    volumes:
      - apiserver-data:/data

    restart: unless-stopped

  frontend:
    image: ghcr.io/dependencytrack/frontend:5.0.1

    environment:
      # IMPORTANT: must point to PUBLIC API domain (NOT localhost)
      API_BASE_URL: "https://mydyklf409lxn7itpnfs6wre.playground.open-elements.cloud"

    ports:
      - "8081:8080"

    restart: unless-stopped

  postgres:
    image: postgres:18-alpine

    environment:
      POSTGRES_DB: "dtrack"
      POSTGRES_USER: "dtrack"
      POSTGRES_PASSWORD: "dtrack"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  apiserver-data: {}
  postgres-data: {}
